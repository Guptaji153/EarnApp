<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
xmlns:h="http://java.sun.com/jsf/html"
xmlns:f="http://java.sun.com/jsf/core">

<f:view>

<f:metadata>
<f:viewParam name="taskId" value="#{adminController.taskId}" />
<f:viewAction action="#{adminController.loadTask}" />
</f:metadata>

<h:head>

<title>Review Campaign</title>

<style>

body{
font-family:Inter,Arial;
background:#f5f7fb;
padding:40px;
}

.card{
background:white;
padding:35px;
border-radius:14px;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
width:650px;
margin:auto;
}

h2{
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
font-size:14px;
font-weight:500;
}

input,textarea{
width:100%;
padding:10px;
margin-top:6px;
border:1px solid #ddd;
border-radius:6px;
}

textarea{
min-height:100px;
}

.btn{
margin-top:25px;
background:#6366f1;
border:none;
color:white;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

.btnReject{
background:#ef4444;
margin-left:10px;
}

.success{
background:#e6f9ed;
color:#1b7f3c;
padding:10px;
border-radius:6px;
margin-bottom:15px;
}

.error{
color:#d32f2f;
margin-bottom:15px;
}
.alert{
background:#e7f8ed;
color:#2e7d32;
padding:10px;
border-radius:6px;
margin-bottom:15px;
}





</style>

</h:head>

<h:body>
<button class="menu-toggle"
        id="menuToggle">
    ☰
</button>

<div class="overlay"
     id="overlay"></div>

<div class="card">

<h2>Review Campaign</h2>
<!-- 
<h:messages globalOnly="true" layout="table" styleClass="error"/>
<h:messages globalOnly="true" layout="table" styleClass="alert"/>   -->   
<h:form id="reviewForm">

<h:messages globalOnly="true"  styleClass="error"/>
<h:messages globalOnly="true"  styleClass="alert"/>
<label>Title</label>
<h:inputText value="#{adminController.selectedTask.title}" readonly="true"/>

<label>Description</label>
<h:inputTextarea value="#{adminController.selectedTask.description}" readonly="true"/>

<label>Steps</label>
<h:inputTextarea value="#{adminController.selectedTask.steps}" readonly="true"/>

<label>Link</label>
<h:inputTextarea value="#{adminController.selectedTask.url}" readonly="true"/>

<label>Country</label>
<h:inputText value="#{adminController.selectedTask.country}" readonly="true"/>

<label>Reward Per User (₹)</label>

<h:inputText id="reward"
value="#{adminController.selectedTask.reward}"/>

<h:message for="reward" styleClass="error"/>

<label>Maximum User Submissions</label>

<h:inputText id="submissionLimit"
value="#{adminController.selectedTask.submissionLimit}" />

<h:message for="submissionLimit" styleClass="error"/>

<label>Rejection Reason</label>

<h:inputTextarea id="reason"
value="#{adminController.selectedTask.rejectionReason}"/>

<h:message for="reason" styleClass="error"/>

<br/>

<h:commandButton
value="Approve"
action="#{adminController.approveTask}"
styleClass="btn"/>

<h:commandButton
value="Reject"
action="#{adminController.rejectTask}"
styleClass="btn btnReject"/>

</h:form>

<br/>

<h:link value="← Back"
outcome="/admin/taskList.xhtml"/>

</div>

   <script type="text/javascript">

//<![CDATA[

window.addEventListener("load", function(){

    const toggleBtn =
    document.getElementById("menuToggle");

    const overlay =
    document.getElementById("overlay");

    const sidebar =
    document.querySelector(".sidebar");

    if(toggleBtn && overlay && sidebar){

        // TOGGLE SIDEBAR

        toggleBtn.addEventListener(
        "click",
        function(){

            sidebar.classList.toggle("open");

            if(sidebar.classList.contains("open")){

                overlay.style.display = "block";

                toggleBtn.innerHTML = "✕";

            } else {

                overlay.style.display = "none";

                toggleBtn.innerHTML = "☰";
            }
        });

        // CLOSE WHEN CLICK OVERLAY

        overlay.addEventListener(
        "click",
        function(){

            sidebar.classList.remove("open");

            overlay.style.display = "none";

            toggleBtn.innerHTML = "☰";
        });

        // AUTO CLOSE AFTER MENU CLICK

        const menuLinks =
        document.querySelectorAll(
        ".menu a, .menu .menu-link");

        menuLinks.forEach(function(link){

            link.addEventListener(
            "click",
            function(){

                if(window.innerWidth <= 768){

                    sidebar.classList.remove("open");

                    overlay.style.display = "none";

                    toggleBtn.innerHTML = "☰";
                }
            });
        });

        // WINDOW RESIZE

        window.addEventListener(
        "resize",
        function(){

            if(window.innerWidth > 768){

                sidebar.classList.remove("open");

                overlay.style.display = "none";

                toggleBtn.innerHTML = "☰";
            }
        });
    }

});

//]]>
  

   </script>
</h:body>

</f:view>
</html>
