<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core">

<h:head>

	<title>Forgot Password</title>

</h:head>

<h:body>

	<h:form id="forgotForm">

		<h2>Forgot Password</h2>

		<h:messages errorStyle="color:red" infoStyle="color:green" />

		<br />

		<h:outputLabel value="Email" />

		<h:inputText value="#{forgotPasswordController.email}" required="true"
			requiredMessage="Email required" />

		<br />
		<br />

		<h:outputLabel value="Select Role" />

		<h:selectOneRadio value="#{forgotPasswordController.role}"
			required="true" requiredMessage="Please select role">

			<f:selectItem itemLabel="User" itemValue="USER" />

			<f:selectItem itemLabel="Partner" itemValue="PARTNER" />

		</h:selectOneRadio>

		<br />

		<h:commandButton value="Send OTP"
			action="#{forgotPasswordController.sendOtp}" />

	</h:form>

</h:body>

</html>
