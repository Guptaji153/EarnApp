<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets">

<f:view>

	<h:head>
		<meta charset="UTF-8" />
		<meta name="viewport"
			content="width=device-width, initial-scale=1.0, user-scalable=yes" />
		<title>Forgot Password | Earn</title>

		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap"
			rel="stylesheet" />
		<link rel="stylesheet" href="#{request.contextPath}/css/forgotPassword.css" />
	</h:head>

	<h:body>
		<!-- ================= NAVBAR ================= -->
		<nav class="top-navbar">
			<div class="nav-container">
				<!-- LOGO -->
				<div class="nav-logo">
					<a href="#{request.contextPath}/index.xhtml"> 
						<span class="logo-icon">💰</span> 
						<span class="logo-text">Earn</span>
					</a>
				</div>

				<!-- NAVIGATION -->
				<div class="nav-menu" id="navMenu">
					<ul class="nav-links">
						<li><a href="#{request.contextPath}/index.xhtml" class="nav-link">Home</a></li>
						<li><a href="#{request.contextPath}/about.xhtml" class="nav-link">About</a></li>
						<li><a href="#{request.contextPath}/services.xhtml" class="nav-link">Services</a></li>
						<li><a href="#{request.contextPath}/userRegistration.xhtml" class="nav-link">User Register</a></li>
						<li><a href="#{request.contextPath}/partnerRegister.xhtml" class="nav-link">Register as partner</a></li>
						<li><a href="#{request.contextPath}/partnerRegister.xhtml" class="nav-link">Contact</a></li>
					</ul>
				</div>

				<!-- RIGHT ACTIONS -->
				<div class="nav-actions">
					<a href="#{request.contextPath}/login.xhtml" class="nav-btn-login active">Sign In</a> 
					<a href="#{request.contextPath}/register.xhtml" class="nav-btn-register">Get Started</a>
				</div>

				<!-- MOBILE TOGGLE -->
				<button class="mobile-menu-toggle" id="mobileMenuToggle"
					aria-label="Toggle menu" type="button">
					<span></span> <span></span> <span></span>
				</button>
			</div>
		</nav>

		<!-- FORGOT PASSWORD CONTAINER -->
		<div class="forgot-container">
			<div class="forgot-card">
				<!-- Logo Section -->
				<div class="forgot-header">
					<div class="logo-wrapper">
						<span class="forgot-logo-icon">🔑</span> 
						<span class="forgot-logo-text">Earn</span>
					</div>
					<h2>Forgot Password</h2>
					<p>Enter your email and select your role to receive an OTP</p>
				</div>

				<!-- Forgot Password Form -->
				<h:form styleClass="forgot-form" id="forgotForm">
					<div class="message-container">
						<h:messages
							errorStyle="color: #dc2626; font-size: 0.875rem; background: #fee2e2; padding: 0.75rem; border-radius: 10px; margin-bottom: 1rem; display: block;"
							infoStyle="color: #059669; font-size: 0.875rem; background: #d1fae5; padding: 0.75rem; border-radius: 10px; margin-bottom: 1rem; display: block;"
							layout="list" />
					</div>

					<!-- Email Input -->
					<div class="input-group">
						<h:outputLabel value="Email Address" styleClass="input-label" />
						<div class="input-icon-wrapper">
							<span class="input-icon">📧</span>
							<h:inputText value="#{forgotPasswordController.email}" 
								required="true"
								requiredMessage="Email required"
								styleClass="input-field" 
								placeholder="Enter your registered email" />
						</div>
					</div>

					<!-- Role Selection -->
					<div class="radio-group">
						<h:outputLabel value="Select Role" styleClass="input-label" />
						<div class="radio-options">
							<label class="radio-option">
								<h:selectOneRadio value="#{forgotPasswordController.role}"
									required="true" 
									requiredMessage="Please select role"
									layout="spread">
									<f:selectItem itemLabel="User" itemValue="USER" />
									<f:selectItem itemLabel="Partner" itemValue="PARTNER" />
								</h:selectOneRadio>
							</label>
						</div>
					</div>

					<!-- Send OTP Button -->
					<h:commandButton value="Send OTP"
						action="#{forgotPasswordController.sendOtp}"
						styleClass="send-otp-btn" />
				</h:form>

				<!-- Back to Login Link -->
				<div class="back-to-login">
					<p>
						Remember your password? <a
							href="#{request.contextPath}/login.xhtml">Back to Login</a>
					</p>
				</div>
			</div>
		</div>

		<!-- SCROLL BUTTON -->
		<button id="scrollTopBtn" onclick="scrollToTop()">↑</button>

		<ui:remove>
		<script>
			// Mobile menu toggle
			const mobileToggle = document.getElementById('mobileMenuToggle');
			const navMenu = document.getElementById('navMenu');

			if (mobileToggle &amp;&amp; navMenu) {
				mobileToggle.addEventListener('click', function() {
					navMenu.classList.toggle('active');
					mobileToggle.classList.toggle('active');
					document.body.classList.toggle('menu-open');
				});

				// Close menu on link click
				const navLinks = document.querySelectorAll('.nav-link');
				navLinks.forEach(link => {
					link.addEventListener('click', () => {
						navMenu.classList.remove('active');
						mobileToggle.classList.remove('active');
						document.body.classList.remove('menu-open');
					});
				});
			}

			// Active link handling
			const currentPath = window.location.pathname;
			const links = document.querySelectorAll('.nav-link');
			links.forEach(link => {
				const href = link.getAttribute('href');
				if (href &amp;&amp; currentPath.includes(href.replace('#{request.contextPath}', ''))) {
					link.classList.add('active');
				}
			});

			// Add floating animation to logo
			const logo = document.querySelector('.forgot-logo-icon');
			if (logo) {
				setInterval(() => {
					logo.style.transform = 'translateY(-3px)';
					setTimeout(() => {
						logo.style.transform = 'translateY(0)';
					}, 300);
				}, 3000);
			}

			// Add input focus effects
			const inputs = document.querySelectorAll('.input-field');
			inputs.forEach(input => {
				input.addEventListener('focus', function() {
					this.parentElement.classList.add('focused');
				});
				input.addEventListener('blur', function() {
					if (!this.value) {
						this.parentElement.classList.remove('focused');
					}
				});
			});

			// Scroll to top button
			const btn = document.getElementById("scrollTopBtn");
			window.addEventListener("scroll", function() {
				btn.style.display = window.scrollY > 300 ? "flex" : "none";
			});
			function scrollToTop() {
				window.scrollTo({ top: 0, behavior: "smooth" });
			}
		</script>
		</ui:remove>

		<script type="text/javascript">

				});
			}

			// Active link handling
			const currentPath = window.location.pathname;

				const href = link.getAttribute('href');
				if (href && currentPath.includes(href.replace('#{request.contextPath}', ''))) {
					link.classList.add('active');
				}
			});

			// Add floating animation to logo
			const logo = document.querySelector('.forgot-logo-icon');
			if (logo) {
				setInterval(() => {
					logo.style.transform = 'translateY(-3px)';
					setTimeout(() => {
						logo.style.transform = 'translateY(0)';
					}, 300);
				}, 3000);
			}

			// Add input focus effects
			const inputs = document.querySelectorAll('.input-field');
			inputs.forEach(input => {
				input.addEventListener('focus', function() {
					this.parentElement.classList.add('focused');
				});
				input.addEventListener('blur', function() {
					if (!this.value) {
						this.parentElement.classList.remove('focused');
					}
				});
			});

			// Scroll to top button
			const btn = document.getElementById("scrollTopBtn");
			window.addEventListener("scroll", function() {
				btn.style.display = window.scrollY > 300 ? "flex" : "none";
			});
			function scrollToTop() {
				window.scrollTo({ top: 0, behavior: "smooth" });
			}

			// Check if content overflows and enable scrolling if needed
			function checkOverflow() {
			    const body = document.body;
			    if (document.documentElement.scrollHeight > window.innerHeight) {
			        body.classList.add('has-overflow');
			        body.style.overflow = 'auto';
			        // Show scroll button only when needed
			        const btn = document.getElementById("scrollTopBtn");
			        if (btn) {
			            btn.style.display = "none";
			        }
			    } else {
			        body.classList.remove('has-overflow');
			        body.style.overflow = 'hidden';
			    }
			}

			// Check on load and resize
			window.addEventListener('load', checkOverflow);
			window.addEventListener('resize', checkOverflow);
		//]]>
		</script>
	</h:body>

</f:view>
</html>
