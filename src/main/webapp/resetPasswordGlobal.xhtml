<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html">

<h:head>

<title>Reset Password</title>

</h:head>

<h:body>

<h:form>

<h2>Reset Password</h2>

<h:messages
errorStyle="color:red"
infoStyle="color:green"/>

<br/>

<h:outputLabel value="New Password"/>

<h:inputSecret
value="#{forgotPasswordController.newPassword}"
required="true"/>

<br/><br/>

<h:outputLabel value="Confirm Password"/>

<h:inputSecret
value="#{forgotPasswordController.confirmPassword}"
required="true"/>

<br/><br/>

<h:commandButton
value="Update Password"
action="#{forgotPasswordController.resetPassword}"/>

</h:form>

</h:body>

</html>
