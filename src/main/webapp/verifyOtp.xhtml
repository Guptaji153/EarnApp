<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html">

<h:head>

<title>Verify OTP</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:#f4f6f9;
}

.otp-container{
    width:420px;
    margin:80px auto;
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    text-align:center;
}

.logo{
    font-size:32px;
    font-weight:bold;
    color:#4F46E5;
    margin-bottom:10px;
}

.sub-text{
    color:#666;
    margin-bottom:30px;
}

.otp-input{
    width:220px;
    height:50px;
    font-size:28px;
    text-align:center;
    letter-spacing:8px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

.otp-input:focus{
    border-color:#4F46E5;
}

.verify-btn{
    width:100%;
    height:45px;
    border:none;
    background:#4F46E5;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    margin-top:20px;
}

.verify-btn:hover{
    background:#4338CA;
}

.resend-btn{
    width:100%;
    height:45px;
    border:none;
    background:#E5E7EB;
    color:#111827;
    font-size:15px;
    border-radius:8px;
    cursor:pointer;
    margin-top:15px;
}

.timer{
    margin-top:15px;
    color:#DC2626;
    font-weight:bold;
    font-size:16px;
}

.footer{
    margin-top:25px;
    font-size:12px;
    color:gray;
}

.msg{
    margin-bottom:15px;
}

</style>

</h:head>

<h:body>

<div class="otp-container">

<div class="logo">
    EarnByApps
</div>

<div class="sub-text">
    Enter the OTP sent to your email
</div>

<h:form id="otpForm">

<div class="msg">

<h:messages
    errorStyle="color:red"
    infoStyle="color:green"/>

</div>

<h:inputText
    id="otp"
    value="#{userController.enteredOtp}"
    required="true"
    requiredMessage="OTP required"
    maxlength="6"
    styleClass="otp-input"/>

<br/>

<div class="timer" id="otpTimer">
    OTP expires in: 2:00
</div>

<h:commandButton
    id="verifyBtn"
    value="Verify OTP"
    action="#{userController.verifyOtp}"
    styleClass="verify-btn"/>

<h:commandButton
    id="resendBtn"
    value="Resend OTP"
    action="#{userController.resendOtp}"
    immediate="true"
    styleClass="resend-btn"/>

</h:form>

<div class="footer">
    © 2026 EarnByApps. All rights reserved.
</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

    // ================= OTP EXPIRY TIMER =================

    let timeLeft = 120;

    const otpTimer =
    document.getElementById("otpTimer");

    const verifyBtn =
    document.getElementById("otpForm:verifyBtn");

    const countdown =
    setInterval(function(){

        let minutes =
        Math.floor(timeLeft / 60);

        let seconds =
        timeLeft % 60;

        otpTimer.innerHTML =
        "OTP expires in: "
        + minutes
        + ":"
        +(seconds &lt; 10 ? "0" : "")
        + seconds;

        timeLeft--;

        if(timeLeft &lt; 0){

            clearInterval(countdown);

            otpTimer.innerHTML =
            "OTP Expired";

            verifyBtn.disabled = true;

            verifyBtn.style.opacity = "0.6";
        }

    },1000);

    // ================= RESEND TIMER =================

    let resendSeconds = 30;

    const resendBtn =
    document.getElementById("otpForm:resendBtn");

    resendBtn.disabled = true;

    const resendTimer =
    setInterval(function(){

        resendSeconds--;

        resendBtn.value =
        "Resend OTP (" + resendSeconds + "s)";

        if(resendSeconds &lt;= 0){

            clearInterval(resendTimer);

            resendBtn.disabled = false;

            resendBtn.value = "Resend OTP";
        }

    },1000);

});

</script>

</h:body>

</html>
