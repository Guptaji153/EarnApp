<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets">

<f:view>

	<h:head>
		<meta charset="UTF-8" />
		<meta name="viewport"
			content="width=device-width, initial-scale=1.0, user-scalable=yes" />
		<title>Verify OTP | Earn</title>

		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap"
			rel="stylesheet" />
		<link rel="stylesheet" href="#{request.contextPath}/css/otp.css" />
	</h:head>

	<h:body>
		<!-- ================= NAVBAR ================= -->
		<nav class="top-navbar">
			<div class="nav-container">
				<!-- LOGO -->
				<div class="nav-logo">
					<a href="#{request.contextPath}/index.xhtml"> 
						<span class="logo-icon">💰</span> 
						<span class="logo-text">Earn</span>
					</a>
				</div>

				<!-- NAVIGATION -->
				<div class="nav-menu" id="navMenu">
					<ul class="nav-links">
						<li><a href="#{request.contextPath}/index.xhtml" class="nav-link">Home</a></li>
						<li><a href="#{request.contextPath}/about.xhtml" class="nav-link">About</a></li>
						<li><a href="#{request.contextPath}/services.xhtml" class="nav-link">Services</a></li>
						<li><a href="#{request.contextPath}/userRegistration.xhtml" class="nav-link">User Register</a></li>
						<li><a href="#{request.contextPath}/partnerRegister.xhtml" class="nav-link">Register as partner</a></li>
						<li><a href="#{request.contextPath}/partnerRegister.xhtml" class="nav-link">Contact</a></li>
					</ul>
				</div>

				<!-- RIGHT ACTIONS -->
				<div class="nav-actions">
					<a href="#{request.contextPath}/login.xhtml" class="nav-btn-login">Sign In</a> 
					<a href="#{request.contextPath}/register.xhtml" class="nav-btn-register">Get Started</a>
				</div>

				<!-- MOBILE TOGGLE -->
				<button class="mobile-menu-toggle" id="mobileMenuToggle"
					aria-label="Toggle menu" type="button">
					<span></span> <span></span> <span></span>
				</button>
			</div>
		</nav>

		<!-- OTP CONTAINER -->
		<div class="otp-container">
			<div class="otp-card">
				<!-- Logo Section -->
				<div class="otp-header">
					<div class="logo-wrapper">
						<span class="otp-logo-icon">🔐</span> 
						<span class="otp-logo-text">Earn</span>
					</div>
					<h2>Verify OTP</h2>
					<p>Enter the verification code sent to your email</p>
				</div>

				<!-- OTP Form -->
				<h:form styleClass="otp-form" id="otpForm">
					<div class="message-container">
						<h:messages
							errorStyle="color: #dc2626; font-size: 0.875rem; background: #fee2e2; padding: 0.75rem; border-radius: 10px; margin-bottom: 1rem; display: block;"
							infoStyle="color: #059669; font-size: 0.875rem; background: #d1fae5; padding: 0.75rem; border-radius: 10px; margin-bottom: 1rem; display: block;"
							layout="list" />
					</div>

					<!-- OTP Input -->
					<div class="input-group">
						<h:outputLabel value="Enter OTP" styleClass="input-label" />
						<div class="input-icon-wrapper">
							<span class="input-icon">✉️</span>
							<h:inputText
								id="otp"
								value="#{userController.enteredOtp}"
								required="true"
								requiredMessage="OTP required"
								maxlength="6"
								styleClass="input-field otp-input"
								placeholder="Enter 6-digit OTP" />
						</div>
					</div>

					<!-- Timer -->
					<div class="timer-container">
						<div class="timer" id="otpTimer">
							<span class="timer-icon">⏱️</span>
							<span class="timer-text">OTP expires in: <span id="timerDisplay">2:00</span></span>
						</div>
					</div>

					<!-- Buttons -->
					<div class="button-group">
						<h:commandButton
							id="verifyBtn"
							value="Verify OTP"
							action="#{userController.verifyOtp}"
							styleClass="verify-btn" />

						<h:commandButton
							id="resendBtn"
							value="Resend OTP (30s)"
							action="#{userController.resendOtp}"
							immediate="true"
							styleClass="resend-btn" />
					</div>
				</h:form>

				<!-- Back to Login Link -->
				<div class="back-to-login">
					<p>
						<a href="#{request.contextPath}/login.xhtml">← Back to Login</a>
					</p>
				</div>

				<!-- Footer -->
				<div class="otp-footer">
					<p>© 2026 Earn. All rights reserved.</p>
				</div>
			</div>
		</div>

		<!-- SCROLL BUTTON - Hidden by default -->
		<button id="scrollTopBtn" onclick="scrollToTop()">↑</button>

		<script type="text/javascript">
		//<![CDATA[
			// Mobile menu toggle
			const mobileToggle = document.getElementById('mobileMenuToggle');
			const navMenu = document.getElementById('navMenu');

			if (mobileToggle && navMenu) {
				mobileToggle.addEventListener('click', function() {
					navMenu.classList.toggle('active');
					mobileToggle.classList.toggle('active');
					document.body.classList.toggle('menu-open');
				});

				// Close menu on link click
				const navLinks = document.querySelectorAll('.nav-link');
				navLinks.forEach(link => {
					link.addEventListener('click', () => {
						navMenu.classList.remove('active');
						mobileToggle.classList.remove('active');
						document.body.classList.remove('menu-open');
					});
				});
			}

			// Active link handling
			const currentPath = window.location.pathname;
			const links = document.querySelectorAll('.nav-link');
			links.forEach(link => {
				const href = link.getAttribute('href');
				if (href && currentPath.includes(href.replace('#{request.contextPath}', ''))) {
					link.classList.add('active');
				}
			});

			// Add floating animation to logo
			const logo = document.querySelector('.otp-logo-icon');
			if (logo) {
				setInterval(() => {
					logo.style.transform = 'translateY(-3px)';
					setTimeout(() => {
						logo.style.transform = 'translateY(0)';
					}, 300);
				}, 3000);
			}

			// Add input focus effects
			const inputs = document.querySelectorAll('.input-field');
			inputs.forEach(input => {
				input.addEventListener('focus', function() {
					this.parentElement.classList.add('focused');
				});
				input.addEventListener('blur', function() {
					if (!this.value) {
						this.parentElement.classList.remove('focused');
					}
				});
			});

			// ================= OTP EXPIRY TIMER =================
			document.addEventListener("DOMContentLoaded", function() {
				let timeLeft = 120;
				const timerDisplay = document.getElementById("timerDisplay");
				const verifyBtn = document.getElementById("otpForm:verifyBtn");
				
				if (timerDisplay) {
					const countdown = setInterval(function() {
						let minutes = Math.floor(timeLeft / 60);
						let seconds = timeLeft % 60;
						
						timerDisplay.innerHTML = minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
						
						timeLeft--;
						
						if (timeLeft < 0) {
							clearInterval(countdown);
							timerDisplay.innerHTML = "Expired";
							timerDisplay.style.color = "#dc2626";
							if (verifyBtn) {
								verifyBtn.disabled = true;
								verifyBtn.style.opacity = "0.6";
								verifyBtn.style.cursor = "not-allowed";
							}
						}
					}, 1000);
				}

				// ================= RESEND TIMER =================
				let resendSeconds = 30;
				const resendBtn = document.getElementById("otpForm:resendBtn");
				
				if (resendBtn) {
					resendBtn.disabled = true;
					
					const resendTimer = setInterval(function() {
						resendSeconds--;
						
						if (resendSeconds > 0) {
							resendBtn.value = "Resend OTP (" + resendSeconds + "s)";
						} else {
							clearInterval(resendTimer);
							resendBtn.disabled = false;
							resendBtn.value = "Resend OTP";
						}
					}, 1000);
				}
			});

			// Scroll to top button
			const btn = document.getElementById("scrollTopBtn");
			window.addEventListener("scroll", function() {
				btn.style.display = window.scrollY > 300 ? "flex" : "none";
			});
			function scrollToTop() {
				window.scrollTo({ top: 0, behavior: "smooth" });
			}
		//]]>
		</script>
	</h:body>

</f:view>
</html>
